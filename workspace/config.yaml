# 默认模型：Qwen3-32B（硅基流动 SiliconFlow，OpenAI 兼容端点）
# - key 从环境变量 OPENAI_API_KEY 读取（不写入此文件，随源码走的只有结构）
# - base_url 走 SiliconFlow 兼容端点 api.siliconflow.cn/v1（OPENAI_BASE_URL 同步设置）
model:
  provider: custom
  default: Qwen/Qwen3-32B
  base_url: https://api.siliconflow.cn/v1

platforms:
  api_server:
    port: 8642
    enabled: true
mcp_servers: {}
